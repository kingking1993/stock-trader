# Render 무료 배포 — GitHub 저장소에서 자동 빌드
# https://render.com → New → Blueprint → 이 저장소 선택
services:
  - type: web
    name: stock-trader-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: singapore
    healthCheckPath: /health
    envVars:
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: ALPACA_PAPER
        value: "true"
      - key: KIS_APP_KEY
        sync: false
      - key: KIS_APP_SECRET
        sync: false
      - key: KIS_ACCOUNT
        sync: false
      - key: KIS_VTS_APP_KEY
        sync: false
      - key: KIS_VTS_APP_SECRET
        sync: false
      - key: KIS_VTS_ACCOUNT
        sync: false
      - key: APP_API_KEY
        generateValue: true
      - key: AGENT_MODEL
        value: claude-sonnet-5
      - key: MAX_ORDER_VALUE
        value: "5000"
      - key: MAX_ORDER_VALUE_KRW
        value: "5000000"
