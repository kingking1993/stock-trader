name: keep-alive

# Render 무료 서버가 15분 유휴 시 잠드는 것을 막기 위해
# 주기적으로 /health 를 호출해 항상 깨어 있게 한다.
on:
  schedule:
    # 매 10분 (GitHub Actions 최소 주기는 5분, 스케줄은 다소 지연될 수 있음)
    - cron: "*/10 * * * *"
  workflow_dispatch: {}   # 수동 실행도 가능

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health
        run: |
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 \
              https://stock-trader-fav6.onrender.com/health || true)
            echo "attempt $i -> HTTP $code"
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 20
          done
          echo "health check did not return 200 (서버가 아직 배포 전이거나 콜드스타트 중일 수 있음)"
